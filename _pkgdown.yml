url: https://davidzenz.github.io/sube/
template:
  bootstrap: 5

home:
  title: sube
  description: Supply-use based econometric tools for Leontief benchmarks,
    SUBE models, and paper-style comparison workflows in R.

reference:
  - title: Data import
    desc: Ingest supply-use tables from WIOD workbooks, FIGARO CSVs, or shipped example datasets.
    contents:
      - import_suts
      - read_figaro
      - sube_example_data
  - title: Matrix building
    desc: Extract the domestic block and assemble the supply, use, and Leontief matrices.
    contents:
      - extract_domestic_block
      - build_matrices
      - extract_leontief_matrices
  - title: Compute & models
    desc: Compute SUBE multipliers and estimate panel or cross-sectional elasticity regressions.
    contents:
      - compute_sube
      - estimate_elasticities
  - title: Pipeline helpers
    desc: One-call wrappers from raw input paths to SUBE results, for single runs or batches.
    contents:
      - run_sube_pipeline
      - batch_sube
  - title: Paper replication
    desc: Filter outliers, prepare comparison tibbles, and plot the paper's three diagnostic views.
    contents:
      - filter_paper_outliers
      - prepare_sube_comparison
      - plot_paper_comparison
      - plot_paper_regression
      - plot_paper_interval_ranges
  - title: Output & export
    desc: Filter, visualize, and write SUBE results to CSV, Excel, Stata, or PDF.
    contents:
      - filter_sube
      - plot_sube
      - write_sube
  - title: internal
    contents:
      - sube-package
      - sube-classes

articles:
  - title: Getting started
    navbar: Get started
    contents:
      - getting-started
      - package-design
  - title: Workflow
    contents:
      - data-preparation
      - modeling-and-outputs
      - pipeline-helpers
  - title: Data sources in practice
    contents:
      - paper-replication
      - figaro-workflow

navbar:
  structure:
    left:  [reference, articles, paper, news]
    right: [search, github]
  components:
    paper:
      text: Paper
      href: https://link.springer.com/article/10.1186/s40008-024-00331-4
    news:
      text: News
      href: news/index.html
